<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{--ink:#18160f;--ink3:#7a776e;--ink4:#b0ada4;--rule:#d8d3c8;--paper:#f9f7f2;
--red:#b83218;--blue:#1f4f96;--green:#1e6b42;--amber:#9a6b10;--purple:#5c3d8f;--muted:#c8c4bc;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--paper);font-family:'DM Mono',monospace;font-size:11px;}
.wrap{padding:16px 20px 20px;}
.lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--rule);}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.leg-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink3);}
.leg-sq{width:10px;height:10px;border-radius:1px;flex-shrink:0;}
.note{font-size:11px;color:var(--ink4);margin-top:8px;font-style:italic;font-family:'DM Mono',monospace;}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const INK='#18160f',INK3='#7a776e',INK4='#b0ada4',RULE='#d8d3c8';
const RED='#b83218',BLUE='#1f4f96',GREEN='#1e6b42',AMBER='#9a6b10',PURPLE='#5c3d8f',MUTED='#c8c4bc',DARK='#3d3a30';
Chart.defaults.font.family="'DM Mono',monospace";
Chart.defaults.font.size=11;
</script>

</head>
<body>
<div class="wrap">
  <div class="lbl">Representation sentiment by citizenship route (%)</div>
  <div class="leg"><div class="leg-i"><div class="leg-sq" style="background:#1e6b42"></div>Well represented</div><div class="leg-i"><div class="leg-sq" style="background:#9a6b10"></div>Somewhat</div><div class="leg-i"><div class="leg-sq" style="background:#b83218"></div>Not really</div><div class="leg-i"><div class="leg-sq" style="background:#18160f"></div>Not at all / unsure</div></div>
  <div style="position:relative;width:100%;height:200px;">
    <canvas id="c"></canvas>
  </div>
  <p class="note">Born-here citizens feel most represented (75% positive/somewhat). Other migrant routes feel least represented.</p>
</div>
<script>
new Chart(document.getElementById('c'),{type:'bar',data:{
  labels:['Born here','Naturalization','Other routes'],
  datasets:[
    {label:'Well represented',data:[8.3,13.3,16.7],backgroundColor:GREEN,borderRadius:1},
    {label:'Somewhat',data:[66.7,53.3,33.3],backgroundColor:AMBER,borderRadius:1},
    {label:'Not really',data:[16.7,25.0,33.3],backgroundColor:RED,borderRadius:1},
    {label:'Not at all / unsure',data:[8.3,8.3,16.7],backgroundColor:INK,borderRadius:1}
  ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
  scales:{x:{stacked:true,ticks:{color:INK3,callback:v=>v+'%'},grid:{color:RULE},max:100},y:{stacked:true,ticks:{color:INK3},grid:{display:false}}},
  plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.x.toFixed(1)+'%'}}}}});
</script>
</body>
</html>
