<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=DM+Mono:wght@300;400&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f7f3ee;
      font-family: 'IBM Plex Mono', monospace;
      color: #0c0b09;
      padding: 1.25rem 1.5rem 1.5rem;
    }
    canvas { display: block; width: 100% !important; }
    .chart-title {
      font-size: .52rem; letter-spacing: .18em; text-transform: uppercase;
      color: #888178; margin-bottom: .85rem;
      border-bottom: 1px solid #d6d0c6; padding-bottom: .4rem;
    }
    #error {
      display: none; padding: 1rem;
      font-size: .58rem; letter-spacing: .06em; color: #c0392b;
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="error"></div>

<script>
// ─── DESIGN TOKENS (match politics-report CSS variables) ──────────────────
var INK = '#0c0b09';
var R   = '#c0392b';   // --sh-red
var G   = '#256b42';   // --sh-green
var A   = '#9a7b2c';   // amber
var M   = '#888178';   // --sh-muted
var GR  = '#d6d0c6';   // --sh-rule
var mf  = { family: 'IBM Plex Mono', size: 9 };
var grid = { color: GR };

// ─── CHART REGISTRY ───────────────────────────────────────────────────────
// Each entry is either:
//   { type: 'chartjs', title: '...', height: 300, config: { ... } }
//   { type: 'custom',  title: '...', height: 300, render: function(container) { ... } }
//
// To add a new chart: append a new key below and embed it anywhere with
//   <iframe src="chart.html?id=your-key" style="width:100%;height:380px;border:none"></iframe>

var CHARTS = {

  // ── LANGUAGE SHIFT TRACKER ───────────────────────────────────────────────

  'lang-vocabulary-adoption': {
    type: 'chartjs', title: 'Vocabulary adoption — years after PVV first use (2017)', height: 280,
    config: {
      type: 'bar',
      data: {
        labels: ['GL-PvdA','D66','CDA','NSC','BBB','VVD'],
        datasets: [{ data: [null,null,7,6,5,6], backgroundColor:[G,G,A,A,A,R], barThickness:24 }]
      },
      options: {
        indexAxis:'y',
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:function(c){return c.raw+' years after PVV first use';}}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M},title:{display:true,text:'Years after PVV first use (2017)',font:mf,color:M},min:0,max:9}, y:{grid:{display:false},ticks:{font:mf,color:'#555'}} }
      }
    }
  },

  'lang-adoption-index': {
    type: 'chartjs', title: 'Framing adoption index around elections', height: 300,
    config: {
      type: 'line',
      data: {
        labels: ['−6mo','−5mo','−4mo','−3mo','−2mo','−1mo','Election','+1mo','+2mo','+3mo'],
        datasets: [
          { label:'2017', data:[1,1.1,1.2,1.8,2.4,2.9,3.1,1.6,1.2,1], borderColor:A, backgroundColor:'transparent', tension:.4, pointRadius:3, borderWidth:2 },
          { label:'2021', data:[1,1,1.3,2.1,2.8,3.2,2.9,1.5,1.1,1],   borderColor:G, backgroundColor:'transparent', tension:.4, pointRadius:3, borderWidth:2 },
          { label:'2023', data:[1,1.2,1.4,2.3,2.9,3.4,3.2,1.4,1.1,1], borderColor:R, backgroundColor:'transparent', tension:.4, pointRadius:3, borderWidth:2 }
        ]
      },
      options: {
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:14}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M}}, y:{grid:grid,ticks:{font:mf,color:M},title:{display:true,text:'Adoption index',font:mf,color:M}} }
      }
    }
  },

  'lang-cosine-similarity': {
    type: 'chartjs', title: 'Cross-party cosine similarity 2017–2025', height: 300,
    config: {
      type: 'line',
      data: {
        labels: ['2017','2018','2019','2020','2021','2022','2023','2024','2025'],
        datasets: [
          { label:'PVV–VVD (migration)', data:[.18,.21,.23,.27,.31,.38,.48,.58,.38], borderColor:R, backgroundColor:'transparent', tension:.4, pointRadius:3, borderWidth:2 },
          { label:'D66–GL-PvdA',         data:[.42,.44,.47,.50,.52,.53,.55,.53,.62], borderColor:G, backgroundColor:'transparent', tension:.4, pointRadius:3, borderWidth:2, borderDash:[6,3] },
          { label:'BBB–PVV',             data:[.12,.14,.17,.23,.29,.39,.51,.55,.44], borderColor:A, backgroundColor:'transparent', tension:.4, pointRadius:3, borderWidth:1.5 },
          { label:'D66–VVD',             data:[.28,.30,.32,.35,.40,.42,.43,.44,.58], borderColor:INK, backgroundColor:'transparent', tension:.4, pointRadius:3, borderWidth:1.5, borderDash:[3,3] }
        ]
      },
      options: {
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:18}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M}}, y:{grid:grid,ticks:{font:mf,color:M},min:0,max:.7,title:{display:true,text:'Cosine similarity',font:mf,color:M}} }
      }
    }
  },

  'lang-jargon-adoption': {
    type: 'chartjs', title: 'PVV jargon adoption by party — 2023 vs 2025', height: 320,
    config: {
      type: 'bar',
      data: {
        labels: ['Volt','SP','GL-PvdA','CU','D66','PvdD','CDA','VVD','BBB','PVV'],
        datasets: [
          { label:'2023', data:[82,74,66,65,59,62,48,38,42,32], backgroundColor:INK+'99', barPercentage:.4 },
          { label:'2025', data:[75,72,60,66,52,64,55,40,31,29], backgroundColor:R+'99',   barPercentage:.4 }
        ]
      },
      options: {
        indexAxis:'y',
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:12}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M},max:100}, y:{grid:{display:false},ticks:{font:mf,color:'#555'}} }
      }
    }
  },

  'lang-topic-shift': {
    type: 'chartjs', title: 'Topic cosine similarity — Defence/Ukraine vs Migration (2026)', height: 280,
    config: {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun'],
        datasets: [
          { label:'Defence/Ukraine', data:[.42,.40,.36,.30,.22,.18], borderColor:G, backgroundColor:G+'18', fill:true, tension:.3, pointRadius:4, borderWidth:2 },
          { label:'Migration terms', data:[.55,.57,.58,.59,.60,.57], borderColor:R, backgroundColor:R+'18', fill:true, tension:.3, pointRadius:4, borderWidth:2 }
        ]
      },
      options: {
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:14}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M}}, y:{grid:grid,ticks:{font:mf,color:M},min:0,max:.75,title:{display:true,text:'Cosine similarity',font:mf,color:M}} }
      }
    }
  },

  'lang-new-coalition-terms': {
    type: 'chartjs', title: 'New coalition-era terms adopted across parties (Nov 2025–Apr 2026)', height: 260,
    config: {
      type: 'bar',
      data: {
        labels: ['Europese defensie','NAVO 3.5% norm','eigen risico','woningbouw versnelling','klimaatinvestering','asielopvang (Jetten)'],
        datasets: [{ data:[5,4,3,6,4,2], backgroundColor:[G,G,A,G,G,R], barThickness:20 }]
      },
      options: {
        indexAxis:'y',
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:function(c){return c.raw+' parties adopted';}}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M},max:10,title:{display:true,text:'# parties using term',font:mf,color:M}}, y:{grid:{display:false},ticks:{font:mf,color:'#555'}} }
      }
    }
  },

  'lang-keyness-index': {
    type: 'chartjs', title: 'Migration vs Opposition framing keyness index 2023–2026', height: 300,
    config: {
      type: 'line',
      data: {
        labels: ['Q1 2023','Q2 2023','Q3 2023','Q4 2023','Q1 2024','Q2 2024','Q3 2024','Q4 2024','Q1 2025','Q2 2025','Q3 2025','Q4 2025','Q1 2026'],
        datasets: [
          { label:'Migration framing',  data:[85,86,88,90,82,80,75,72,74,78,84,82,72], borderColor:R, backgroundColor:'transparent', tension:.4, pointRadius:2, borderWidth:2 },
          { label:'Opposition framing', data:[5,5,6,4,3,3,4,5,6,7,14,16,24],           borderColor:A, backgroundColor:'transparent', tension:.4, pointRadius:2, borderWidth:2, borderDash:[4,3] }
        ]
      },
      options: {
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:14}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M,maxRotation:45}}, y:{grid:grid,ticks:{font:mf,color:M},title:{display:true,text:'Keyness index',font:mf,color:M}} }
      }
    }
  },

  'lang-similarity-matrix': {
    type: 'custom', title: 'Party language similarity matrix', height: 380,
    render: function(container) {
      var parties = ['VVD','D66','GL-PvdA','CDA','PVV','BBB','JA21','SP','PvdD','CU'];
      var sim = [
        [1,.58,.31,.44,.35,.34,.30,.18,.16,.26],
        [.58,1,.55,.40,.13,.22,.18,.26,.30,.22],
        [.31,.55,1,.30,.07,.16,.12,.36,.38,.24],
        [.44,.40,.30,1,.18,.28,.26,.20,.16,.42],
        [.35,.13,.07,.18,1,.48,.44,.10,.06,.12],
        [.34,.22,.16,.28,.48,1,.40,.16,.12,.20],
        [.30,.18,.12,.26,.44,.40,1,.12,.10,.18],
        [.18,.26,.36,.20,.10,.16,.12,1,.28,.20],
        [.16,.30,.38,.16,.06,.12,.10,.28,1,.18],
        [.26,.22,.24,.42,.12,.20,.18,.20,.18,1]
      ];
      function sc(v){
        if(v>=.9)return{bg:'#9a7b2c',color:'#fff8e0'};
        if(v>=.5)return{bg:'#5a4510',color:'#f0d060'};
        if(v>=.35)return{bg:'#2a2010',color:'#c9a84c'};
        if(v>=.2)return{bg:'#1e1a10',color:'#9a7b2c'};
        return{bg:'#efebe3',color:'#c0b090'};
      }
      var g = document.createElement('div');
      g.style.cssText = 'display:grid;grid-template-columns:60px '+parties.map(function(){return'1fr';}).join(' ')+';gap:2px;min-width:480px;overflow-x:auto';
      // header row
      var blank = document.createElement('div'); blank.style.height='28px'; g.appendChild(blank);
      parties.forEach(function(p){
        var d = document.createElement('div');
        d.style.cssText = 'font-family:IBM Plex Mono;font-size:.44rem;color:#888;text-align:center;padding:3px 1px;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap';
        d.textContent = p; g.appendChild(d);
      });
      parties.forEach(function(row, i){
        var rl = document.createElement('div');
        rl.style.cssText = 'font-family:IBM Plex Mono;font-size:.44rem;color:#888;display:flex;align-items:center;justify-content:flex-end;padding-right:4px';
        rl.textContent = row; g.appendChild(rl);
        parties.forEach(function(_, j){
          var v = sim[i][j], c = sc(v);
          var cell = document.createElement('div');
          cell.style.cssText = 'height:28px;background:'+c.bg+';display:flex;align-items:center;justify-content:center;font-family:IBM Plex Mono;font-size:.44rem;color:'+c.color;
          cell.textContent = v.toFixed(2); g.appendChild(cell);
        });
      });
      container.appendChild(g);
    }
  },

  // ── GENDER & SPEAKING TIME ────────────────────────────────────────────────

  'gender-female-share': {
    type: 'chartjs', title: 'Female seat share (%) by party — 2023 vs 2025', height: 320,
    config: {
      type: 'bar',
      data: {
        labels: ['D66','PVV','VVD','GL-PvdA','CDA','JA21','FvD','BBB','DENK','SGP','PvdD','CU','SP','Volt'],
        datasets: [
          { label:'2023', data:[56,19,54,56,40,0,0,57,0,0,67,33,40,50], backgroundColor:INK+'cc', barPercentage:.4 },
          { label:'2025', data:[50,19,32,70,50,22,14,50,0,0,67,33,67,0], backgroundColor:R+'cc',   barPercentage:.4 }
        ]
      },
      options: {
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:12}} },
        scales:{ x:{grid:{display:false},ticks:{font:mf,color:'#555'}}, y:{grid:grid,ticks:{font:mf,color:M,callback:function(v){return v+'%';}},max:80,min:0} }
      }
    }
  },

  'gender-seat-change': {
    type: 'chartjs', title: 'Seat change 2023 → 2025 by party', height: 320,
    config: {
      type: 'bar',
      data: {
        labels: ['D66','CDA','JA21','FvD','50PLUS','SP→','SGP=','PvdD=','CU=','DENK=','Volt↓','BBB','VVD','GL-PvdA','PVV','NSC'],
        datasets: [{
          data: [17,13,8,4,2,0,0,0,0,0,-1,-3,-2,-5,-11,-20],
          backgroundColor: [17,13,8,4,2,0,0,0,0,0,-1,-3,-2,-5,-11,-20].map(function(v){return v>0?G:v<0?R:'#ccc';}),
          barThickness: 18
        }]
      },
      options: {
        indexAxis:'y',
        plugins:{ legend:{display:false} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M},title:{display:true,text:'Seat change (2023→2025)',font:mf,color:M}}, y:{grid:{display:false},ticks:{font:mf,color:'#555'}} }
      }
    }
  },

  'gender-female-by-size': {
    type: 'chartjs', title: 'Female share (%) ordered by seat count — 2025 Kamer', height: 360,
    config: {
      type: 'bar',
      data: {
        labels: ['D66 (26)','PVV (26)','VVD (22)','GL-PvdA (20)','CDA (18)','JA21 (9)','FvD (7)','BBB (4)','DENK (3)','SGP (3)','PvdD (3)','CU (3)','SP (3)','50PLUS (2)','Volt (1)'],
        datasets: [{
          data: [50,19,32,70,50,22,14,50,0,0,67,33,67,50,0],
          backgroundColor: [50,19,32,70,50,22,14,50,0,0,67,33,67,50,0].map(function(v){return v>=43?G:v>=30?A:v>0?R:'#ccc';}),
          barThickness: 20
        }]
      },
      options: {
        indexAxis:'y',
        plugins:{ legend:{display:false} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M,callback:function(v){return v+'%';}},max:80}, y:{grid:{display:false},ticks:{font:mf,color:'#555'}} }
      }
    }
  },

  'gender-topic-share': {
    type: 'chartjs', title: 'Female word share by topic — 2023 term vs 2025 term (est.)', height: 320,
    config: {
      type: 'bar',
      data: {
        labels: ['Health & Care','Education','Social Affairs','Housing','Environment','Finance','Justice','Foreign Affairs','Defence & Security'],
        datasets: [
          { label:'2023 term',      data:[51,46,43,41,39,26,30,23,16], backgroundColor:INK+'bb', barPercentage:.4 },
          { label:'2025 term (est.)',data:[54,48,46,44,42,30,32,28,26], backgroundColor:R+'bb',   barPercentage:.4 },
          { data:Array(9).fill(39.3), type:'line', borderColor:INK, borderWidth:1, borderDash:[4,4], pointRadius:0, label:'2023 seat share (39.3%)' },
          { data:Array(9).fill(43.3), type:'line', borderColor:R,   borderWidth:1, borderDash:[4,4], pointRadius:0, label:'2025 seat share (43.3%)' }
        ]
      },
      options: {
        indexAxis:'y',
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:16}} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:M,callback:function(v){return v+'%';}},max:65}, y:{grid:{display:false},ticks:{font:mf,color:'#555'}} }
      }
    }
  },

  'gender-historical-line': {
    type: 'chartjs', title: 'Female seat share — Tweede Kamer 2010–2025', height: 260,
    config: {
      type: 'line',
      data: {
        labels: ['2010','2012','2017','2021','2023','2025'],
        datasets: [{
          data: [42.7,40,36,39.3,39.3,43.3],
          borderColor: R, backgroundColor: R+'15', fill: true, tension:.35,
          pointRadius: 5, pointBackgroundColor:[M,M,M,M,INK,R], borderWidth:2, pointHoverRadius:7
        }]
      },
      options: {
        plugins:{ legend:{display:false} },
        scales:{ x:{grid:grid,ticks:{font:mf,color:'#555'}}, y:{grid:grid,ticks:{font:mf,color:M,callback:function(v){return v+'%';}},min:30,max:50} }
      }
    }
  },

  'gender-historical-bar': {
    type: 'chartjs', title: 'Female seat share per election — 2010–2025', height: 260,
    config: {
      type: 'bar',
      data: {
        labels: ['2010','2012','2017','2021','2023','2025★'],
        datasets: [{ data:[42.7,40,36,39.3,39.3,43.3], backgroundColor:[M,M,M,A,INK,R], barThickness:32 }]
      },
      options: {
        plugins:{ legend:{display:false} },
        scales:{ x:{grid:{display:false},ticks:{font:mf,color:'#555'}}, y:{grid:grid,ticks:{font:mf,color:M,callback:function(v){return v+'%';}},min:30,max:48} }
      }
    }
  },

  'gender-all-male-parties': {
    type: 'chartjs', title: 'All-male party delegations — 2023 vs 2025', height: 260,
    config: {
      type: 'bar',
      data: {
        labels: ['SGP','FvD','DENK','JA21','Volt'],
        datasets: [
          { label:'2023 seats', data:[3,3,3,1,0], backgroundColor:INK+'cc', barPercentage:.4 },
          { label:'2025 seats', data:[3,7,3,0,1], backgroundColor:R+'cc',   barPercentage:.4 }
        ]
      },
      options: {
        plugins:{ legend:{display:true,position:'bottom',labels:{font:{family:'IBM Plex Mono',size:9},color:'#444',boxWidth:12}} },
        scales:{ x:{grid:{display:false},ticks:{font:mf,color:'#555'}}, y:{grid:grid,ticks:{font:mf,color:M},max:10,min:0,title:{display:true,text:'Seats (0% female)',font:mf,color:M}} }
      }
    }
  }

  // ── ADD NEW CHARTS HERE ───────────────────────────────────────────────────
  // Follow the same pattern: add a key, set type to 'chartjs' or 'custom',
  // provide config or render function. Then embed with:
  //   <iframe src="chart.html?id=your-key" style="width:100%;height:380px;border:none"></iframe>

};

// ─── RENDERER ─────────────────────────────────────────────────────────────
var id = new URLSearchParams(window.location.search).get('id');
var entry = id && CHARTS[id];

if (!entry) {
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = id ? 'Unknown chart id: "' + id + '"' : 'No chart id specified. Add ?id=<chart-id> to the URL.';
} else {
  var root = document.getElementById('root');

  if (entry.title) {
    var ttl = document.createElement('div');
    ttl.className = 'chart-title';
    ttl.textContent = entry.title;
    root.appendChild(ttl);
  }

  if (entry.type === 'chartjs') {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:100%;height:' + (entry.height || 300) + 'px';
    var canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    root.appendChild(wrap);
    var cfg = entry.config;
    cfg.options = cfg.options || {};
    cfg.options.responsive = true;
    cfg.options.maintainAspectRatio = false;
    new Chart(canvas, cfg);
  }

  if (entry.type === 'custom') {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'width:100%;min-height:' + (entry.height || 300) + 'px;overflow-x:auto';
    root.appendChild(wrap);
    entry.render(wrap);
  }
}
</script>
</body>
</html>
