    <script>
  (function () {
    function getConsent() {
      try { return localStorage.getItem('cookieConsent'); } 
      catch (e) { return null; }
    }
    function setConsent(val) {
      try { localStorage.setItem('cookieConsent', val); } 
      catch (e) {}
    }

    var banner = document.getElementById('cookie-banner');

    if (!banner) return;

    if (getConsent()) {
      banner.style.display = 'none';
      return;
    }

    banner.style.display = 'flex';

    document.getElementById('cookie-accept').addEventListener('click', function () {
      setConsent('accepted');
      banner.style.opacity = '0';
      setTimeout(function () { banner.style.display = 'none'; }, 400);
    });

    document.getElementById('cookie-reject').addEventListener('click', function () {
      banner.style.opacity = '0';
      setTimeout(function () { banner.style.display = 'none'; }, 400);
    });
  })();
</script>

function ChartLeadership({ s }) {
  const dims = ['Appearance','Trustworthiness','Competence','Approachability','Leadership'];
  const data = { Jetten:[6.81,6.33,6.65,6.56,6.35], Baudet:[5.26,5.07,6.12,4.53,5.47], Schoof:[3.98,4.79,5.33,4.44,4.67] };
  const W=260, H=160, lPad=88, rPad=12, tPad=18, bPad=20, maxV=10;
  const chartW = W-lPad-rPad, chartH = H-tPad-bPad;
  const colors = [s.red, s.muted, s.border.replace('#','') === 'ddd8d0' ? '#c5b8a8' : '#bbb'];
  const barH = 7, gap = 3, groupGap = 8, groupH = 3*barH+2*gap;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H}}>
      <text x={lPad} y={12} fontSize={8} fill={s.muted} fontFamily="DM Sans" letterSpacing="0.08em">RATING 1–10 SCALE</text>
      {dims.map((dim,di) => {
        const y = tPad + di*(groupH+groupGap);
        return (
          <g key={dim}>
            <text x={lPad-4} y={y+groupH/2+3} fontSize={8.5} fill={s.muted} fontFamily="DM Sans" textAnchor="end">{dim}</text>
            {['Jetten','Baudet','Schoof'].map((p,pi) => {
              const bw = (data[p][di]/maxV)*chartW;
              return (
                <g key={p}>
                  <rect x={lPad} y={y+pi*(barH+gap)} width={bw} height={barH} fill={pi===0?s.red:pi===1?s.muted:'#c5b8a8'} rx={1}/>
                  <text x={lPad+bw+3} y={y+pi*(barH+gap)+barH-1} fontSize={7.5} fill={s.muted} fontFamily="DM Sans">{data[p][di]}</text>

            })}

        </g>

function ChartPolls({ s }) {
  const parties = [
    {name:'D66', color:s.red, pts:[22,23,24,22,24,25,23,24,26,25,24,26]},
    {name:'VVD', color:s.muted, pts:[18,17,16,17,15,16,16,15,14,15,16,14]},
    {name:'GL-PvdA', color:'#8a9e8a', pts:[19,20,19,21,20,19,21,22,21,20,19,21]},
    {name:'PVV', color:'#b08060', pts:[14,13,14,13,14,15,14,13,12,13,14,12]},
  ];
  const W=260,H=145,lPad=24,rPad=40,tPad=18,bPad=24;
  const chartW=W-lPad-rPad, chartH=H-tPad-bPad;
  const max=30,min=8;
  const toY=(v)=>tPad+chartH-(((v-min)/(max-min))*chartH);
  const toX=(i,len)=>lPad+(i/(len-1))*chartW;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H}}>
      <text x={lPad} y={12} fontSize={8} fill={s.muted} fontFamily="DM Sans" letterSpacing="0.08em">POLLING AVERAGE · % SEATS 2026</text>
      {[15,20,25].map(v=><line key={v} x1={lPad} y1={toY(v)} x2={W-rPad} y2={toY(v)} stroke={s.border} strokeWidth={0.5} strokeDasharray="2,3"/>)}
      {parties.map(p=>{
        const path=p.pts.map((v,i)=>`${i===0?'M':'L'}${toX(i,p.pts.length)},${toY(v)}`).join(' ');
        const lastX=toX(p.pts.length-1,p.pts.length);
        const lastY=toY(p.pts[p.pts.length-1]);
        return (
          <g key={p.name}>
            <path d={path} fill="none" stroke={p.color} strokeWidth={1.5} strokeLinejoin="round" strokeLinecap="round"/>
            <text x={lastX+4} y={lastY+3} fontSize={8} fill={p.color} fontFamily="DM Sans" fontWeight={500}>{p.name}</text>
          </g>
        );
      })}
      {['Jan','Mar','May','Jul','Sep','Nov'].map((m,i)=><text key={m} x={lPad+i*(chartW/5)} y={H-8} fontSize={7} fill={s.muted} fontFamily="DM Sans" textAnchor="middle">{m}</text>)}
    </svg>
  );
}

function ChartElectionsStats({ s }) {

  const W=260,H=150,lPad=52,rPad=12,tPad=18,bPad=16;

function ChartFrance({ s }) {
  const parties = [['RN',32],['NFP',28],['Macron',25],['LR',7],['Other',8]];
  const colors = [s.red,'#8a9e8a',s.muted,'#b0a090','#c5b8a8'];
  const W=260,H=150,cx=110,cy=75,r=55;
  let angle=-Math.PI/2;
  const total=parties.reduce((a,b)=>a+b[1],0);
  const slices = parties.map(([name,val],i)=>{
    const sweep=(val/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return {path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`,color:colors[i],name,val};
  });
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H}}>
      <text x={10} y={12} fontSize={8} fill={s.muted} fontFamily="DM Sans" letterSpacing="0.08em">ASSEMBLÉE NATIONALE SEAT SHARE (%)</text>
      {slices.map((sl,i)=><path key={i} d={sl.path} fill={sl.color} stroke="#fff" strokeWidth={1.5}/>)}
      {parties.map(([name,val],i)=>(
        <g key={name} transform={`translate(175,${20+i*24})`}>
          <rect width={8} height={8} fill={colors[i]} rx={1}/>
          <text x={12} y={8} fontSize={8.5} fill={s.muted} fontFamily="DM Sans">{name} {val}%</text>
        </g>
      ))}
    </svg>
  );
}

}

/* ─── ARTICLE MODAL ─── */
function ArticleModal({ a, s, onClose }) {
  useEffect(()=>{ const fn=e=>{if(e.key==='Escape')onClose();}; window.addEventListener('keydown',fn); return()=>window.removeEventListener('keydown',fn); },[]);
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(0,0,0,0.55)', display:'flex', alignItems:'flex-start', justifyContent:'center', overflowY:'auto', padding:'48px 16px' }}>
      <div style={{ background:s.bg, maxWidth:780, width:'100%', padding:'56px 64px', position:'relative', boxShadow:'0 24px 80px rgba(0,0,0,0.18)' }}>
        <button onClick={onClose} style={{ position:'absolute', top:24, right:28, background:'none', border:'none', fontSize:18, cursor:'pointer', color:s.muted }}>✕</button>
        <Pill cat={a.category} s={s}/>
        <h1 style={{ fontFamily:'Cormorant Garamond', fontSize:44, fontWeight:600, lineHeight:1.1, color:s.ink, marginTop:16, marginBottom:20 }}>{a.titleEl}</h1>
        <p style={{ fontFamily:'DM Sans', fontSize:14, color:s.muted, lineHeight:1.75, fontWeight:300, marginBottom:28 }}>{a.subtitle}</p>
        {a.stats.length>0 && (
          <div style={{ display:'flex', gap:48, padding:'20px 0', borderTop:`1px solid ${s.border}`, borderBottom:`1px solid ${s.border}`, marginBottom:28 }}>
            {a.stats.map((st,i)=>(
              <div key={i}><div style={{ fontFamily:'Cormorant Garamond', fontSize:34, fontWeight:700, color:s.red }}>{st.value}</div><div style={{ fontFamily:'DM Sans', fontSize:11, color:s.muted, maxWidth:220, lineHeight:1.5 }}>{st.label}</div></div>
            ))}
          </div>
        )}
        <ArticleViz a={a} s={s}/>
        <p style={{ fontFamily:'DM Sans', fontSize:15, color:s.ink, lineHeight:1.8, fontWeight:300, marginTop:24 }}>{a.excerpt}</p>
        <div style={{ marginTop:36, display:'flex', gap:16, alignItems:'center' }}>
          <a href={a.url} target="_blank" rel="noopener" style={{ fontFamily:'DM Sans', fontSize:11, fontWeight:500, letterSpacing:'0.14em', textTransform:'uppercase', background:s.red, color:'#fff', padding:'14px 28px', display:'inline-block' }}>Read Full Analysis →</a>
          <span style={{ fontFamily:'DM Sans', fontSize:10, color:s.muted }}>{a.date} · {a.tag}</span>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ─── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "style": "economist",
  "accentRed": "#8b2700",
  "photoUrl": ""
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('home');
  const [article, setArticle] = useState(null);

  const base = STYLES[(tweaks&&tweaks.style)||'fusion'] || STYLES.fusion;
  const s = { ...base, red:(tweaks&&tweaks.accentRed)||base.red };

  useEffect(()=>{
    document.body.style.background = s.bg;
    document.body.style.color = s.ink;
  },[s.bg,s.ink]);

  const navigate = p => { setPage(p); window.scrollTo({top:0,behavior:'smooth'}); };

  return (
    <div style={{ minHeight:'100vh', background:s.bg, color:s.ink }}>
      <Header s={s} page={page} setPage={navigate}/>
      {page==='home' && <HomePage s={s} onArticle={setArticle} setPage={navigate} photoUrl={tweaks&&tweaks.photoUrl}/>}
      {page==='archive' && <ArchivePage s={s} onArticle={setArticle}/>}
      {page==='about' && <AboutPage s={s} photoUrl={tweaks&&tweaks.photoUrl}/>}
      {page==='contact' && <ContactPage s={s}/>}
      <Footer s={s} setPage={navigate}/>
      {article && <ArticleModal a={article} s={s} onClose={()=>setArticle(null)}/>}
      <TweaksPanel>
        <TweakSection label="Style Direction"/>
        <TweakRadio label="Direction" value={tweaks&&tweaks.style} options={['fusion','economist','vogue']} onChange={v=>setTweak('style',v)}/>
        <TweakSection label="Accent"/>
        <TweakColor label="Crimson red" value={tweaks&&tweaks.accentRed} onChange={v=>setTweak('accentRed',v)}/>
        <TweakSection label="Photo"/>
        <TweakText label="GitHub photo URL" value={tweaks&&tweaks.photoUrl} onChange={v=>setTweak('photoUrl',v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
