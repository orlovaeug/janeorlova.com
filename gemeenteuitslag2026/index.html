function useReveal(ref){
const [v,setV]=useState(false);
useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:0.1});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
return v;
}
function useCountUp(target,vis,dur=1000){
const [n,setN]=useState(0);
useEffect(()=>{if(!vis)return;let s=null;const f=(t)=>{if(!s)s=t;const p=Math.min((t-s)/dur,1);setN(Math.floor(p*target));if(p<1)requestAnimationFrame(f);};requestAnimationFrame(f);},[vis,target]);
return n;
}
function useInlineTweaks(defaults){
const [values,setValues]=useState(defaults);
const [open,setOpen]=useState(false);
useEffect(()=>{const onMsg=(e)=>{if(e?.data?.type===’__activate_edit_mode’)setOpen(true);if(e?.data?.type===’__deactivate_edit_mode’)setOpen(false);};window.addEventListener(‘message’,onMsg);window.parent.postMessage({type:’__edit_mode_available’},’*’);return()=>window.removeEventListener(‘message’,onMsg);},[]);
const setTweak=(key,val)=>{setValues(v=>{const n={…v,[key]:val};window.parent.postMessage({type:’__edit_mode_set_keys’,edits:n},’*’);return n;});};
const close=()=>{setOpen(false);window.parent.postMessage({type:’__edit_mode_dismissed’},’*’);};
return[values,setTweak,open,close];
}

<div style={{width:Math.max(6,r.pct*0.9),height:3,background:PC[r.p]||C.muted,borderRadius:1,opacity:0.75}}/>
</div>))}
<span style={{fontFamily:‘DM Sans’,fontSize:9,color:C.muted,marginLeft:6}}>{top4.map(r=>r.p).join(’ · ’)}</span>
</div>
</div>
{isEx&&(<div style={{padding:‘12px 0 16px 16px’,borderLeft:`2px solid ${PC[d.w]||C.red}`,marginBottom:4}}>
<div style={{fontFamily:‘DM Sans’,fontSize:10,fontWeight:500,textTransform:‘uppercase’,letterSpacing:‘0.1em’,color:C.muted,marginBottom:10}}>Alle partijen</div>
<div style={{display:‘flex’,flexDirection:‘column’,gap:6}}>
{results.map(r=>(<div key={r.p} style={{display:‘flex’,alignItems:‘center’,gap:10}}>
<span style={{fontFamily:‘DM Sans’,fontSize:10,color:C.muted,minWidth:120}}>{r.p}</span>
<div style={{height:4,background:C.card,borderRadius:2,flex:1,overflow:‘hidden’}}><div style={{height:‘100%’,width:`${(r.pct/maxPct)*100}%`,background:PC[r.p]||C.muted,borderRadius:2}}/></div>
<span style={{fontFamily:‘DM Sans’,fontSize:10,color:C.muted,minWidth:36,textAlign:‘right’}}>{r.pct}%</span>
</div>))}
</div>
</div>)}
</div>);
})}

  </div>);
}

{demos.map((d)=>(<div key={d.n} style={{display:‘grid’,gridTemplateColumns:‘150px 70px 72px 1fr 1fr 55px 1fr’,gap:10,padding:‘12px 0’,borderBottom:`1px solid ${C.border}`,alignItems:‘center’}}>

<div><div style={{height:4,background:C.card,borderRadius:2,marginBottom:3,overflow:‘hidden’}}><div style={{height:‘100%’,width:`${d.nw}%`,background:C.red,borderRadius:2}}/></div><span style={{fontFamily:‘DM Sans’,fontSize:10,color:C.muted}}>{d.nw}%</span></div>

  </div>);

useEffect(()=>setTab(‘kaart’),[cityKey]);
if(!city)return null;
const winner=city.results[0];
const serif=isE?‘Playfair Display’:‘Cormorant Garamond’;
const hasDemographics=!!DEMOGRAPHICS[cityKey];

return(<div ref={ref} style={{animation:‘fadeUp 0.35s ease’}}>
{/* Winner banner */}
<div style={{padding:isE?‘24px 0 18px’:‘32px 0 24px’,borderBottom:`1px solid ${C.border}`,display:‘grid’,gridTemplateColumns:‘auto 1fr auto’,gap:20,alignItems:‘center’}}>
<div style={{width:40,height:40,borderRadius:‘50%’,background:PC[winner.p]||C.muted,flexShrink:0,opacity:0.9}}/>
<div>
<div style={{fontFamily:‘DM Sans’,fontSize:9.5,fontWeight:500,letterSpacing:‘0.16em’,textTransform:‘uppercase’,color:C.muted,marginBottom:3}}>Grootste partij</div>
<div style={{fontFamily:serif,fontSize:isE?26:32,fontWeight:isE?700:600,color:PC[winner.p]||C.ink,lineHeight:1}}>{winner.p}</div>
</div>
<div style={{textAlign:‘right’}}>
<div style={{fontFamily:‘Cormorant Garamond’,fontSize:40,fontWeight:700,color:PC[winner.p]||C.ink,lineHeight:1}}>{winner.pct}%</div>
<div style={{fontFamily:‘DM Sans’,fontSize:10,color:C.muted,marginTop:2}}>{winner.z} van {city.zetels} zetels</div>
</div>
</div>

```
{/* Stats strip */}
<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',padding:'14px 0',borderBottom:`1px solid ${C.border}`}}>
  {[{v:city.stemmen.toLocaleString('nl-NL'),l:'Stemmen'},{v:`${city.opkomst}%`,l:'Opkomst'},{v:`${city.zetels}`,l:'Zetels'}].map((s,i)=>(
    <div key={i} style={{padding:`0 ${i<2?22:0}px 0 0`,borderRight:i<2?`1px solid ${C.border}`:'none',marginRight:i<2?22:0}}>
      <div style={{fontFamily:'Cormorant Garamond',fontSize:24,fontWeight:700,color:C.ink,lineHeight:1}}>{s.v}</div>
      <div style={{fontFamily:'DM Sans',fontSize:9.5,color:C.muted,marginTop:4,letterSpacing:'0.06em',textTransform:'uppercase'}}>{s.l}</div>
    </div>
  ))}
</div>

{/* Sub-tabs */}
<div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:28,paddingTop:14}}>
  {['kaart','overzicht',...(hasDemographics?['demografie']:[])].map(t=>(<button key={t} onClick={()=>setTab(t)} style={{fontFamily:'DM Sans',fontSize:11,fontWeight:tab===t?500:400,letterSpacing:'0.1em',textTransform:'uppercase',color:tab===t?C.red:C.muted,padding:'8px 20px 9px 0',background:'none',border:'none',cursor:'pointer',borderBottom:`2px solid ${tab===t?C.red:'transparent'}`,marginBottom:-1,transition:'color 0.15s'}}>{t}</button>))}
</div>

{/* Kaart tab */}
{tab==='kaart'&&(<div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:isE?36:48}}>

    <PartyBars results={city.results} vis={vis} isE={isE}/>
  </div>
</div>)}

{/* Overzicht tab */}
{tab==='overzicht'&&<DistrictOverviewTable districts={city.districts} results={city.results}/>}

{/* Demografie tab */}
{tab==='demografie'&&<DemographicsTable cityKey={cityKey}/>}

  </div>);
}

const TWEAK_DEFAULTS = {“variant”:“economist”};
function App(){
const [t,setT,panelOpen,closePanel]=useInlineTweaks(TWEAK_DEFAULTS);
const v=t.variant;
return(<div style={{minHeight:‘100vh’,display:‘flex’,flexDirection:‘column’}}>
<InlineTweaksPanel open={panelOpen} onClose={closePanel}><TweakSegmented label=“Design stijl” value={v} options={[‘vogue’,‘economist’]} onChange={val=>setT(‘variant’,val)}/></InlineTweaksPanel>
