#!/usr/bin/env python3
"""
inject_moties.py — injects moties.json data into index.html’s INIT array.

Must be run AFTER fetch_moties.py and fix_moties_json.py.
Reads moties.json, finds the INIT= line in index.html, replaces it.

Usage: python3 inject_moties.py
"""

import json
import re
import sys
import os
from datetime import date

MOTIES_FILE = 'moties.json'
HTML_FILE = 'index.html'
AGENDA_FILE = 'agenda.json'


def load_json_file(path):
    if not os.path.exists(path):
        return None
    with open(path, encoding='utf-8') as f:
        return json.load(f)


def replace_js_array(html, var_name, data):
    """
    Replaces a JS variable like:
    var INIT=[...];

    Works even if there are spaces or line breaks.
    """
    pattern = rf'var\s+{var_name}\s*=\s*\[.*?\];'
    json_data = json.dumps(data, ensure_ascii=False, separators=(',', ':'))
    replacement = f'var {var_name}={json_data};'

    new_html, count = re.subn(pattern, replacement, html, flags=re.DOTALL)
    return new_html, count


def main():
    print(f'inject_moties.py — {date.today().isoformat()}')

    # ── Load moties.json ──
    moties = load_json_file(MOTIES_FILE)
    if moties is None:
        print(f'ERROR: {MOTIES_FILE} niet gevonden', file=sys.stderr)
        sys.exit(1)

    print(f'Geladen: {len(moties)} moties uit {MOTIES_FILE}')

    # ── Load index.html ──
    if not os.path.exists(HTML_FILE):
        print(f'ERROR: {HTML_FILE} niet gevonden', file=sys.stderr)
        sys.exit(1)

    with open(HTML_FILE, encoding='utf-8') as f:
        html = f.read()

    # ── Replace INIT ──
    html, count = replace_js_array(html, 'INIT', moties)
    if count == 0:
        print('ERROR: INIT variabele niet gevonden in index.html', file=sys.stderr)
        sys.exit(1)

    print(f'INIT vervangen: {len(moties)} moties geïnjecteerd')

    # ── Replace AGENDA (optional) ──
    agenda = load_json_file(AGENDA_FILE)
    if agenda is not None:
        html, count_agenda = replace_js_array(html, 'AGENDA', agenda)
        if count_agenda > 0:
            print(f'AGENDA vervangen: {len(agenda)} items geïnjecteerd')
        else:
            print('AGENDA variabele niet gevonden, overgeslagen')

    # ── Write back ──
    with open(HTML_FILE, 'w', encoding='utf-8') as f:
        f.write(html)

    print(f'Klaar: {HTML_FILE} bijgewerkt')

    # ── Stats ──
    aangenomen = sum(1 for m in moties if m.get('status') == 'aangenomen')
    verworpen = sum(1 for m in moties if m.get('status') == 'verworpen')
    in_behandeling = sum(1 for m in moties if m.get('status') == 'in_behandeling')

    print('Stats:')
    print(f'  Aangenomen: {aangenomen}')
    print(f'  Verworpen: {verworpen}')
    print(f'  In behandeling: {in_behandeling}')


if __name__ == '__main__':
    main()
