name: Update Moties

on:
  schedule:
    - cron: '0 8 * * *'   # dagelijks 08:00 UTC
  workflow_dispatch:        # handmatig triggeren

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests --break-system-packages 2>/dev/null || pip install requests

      - name: Run fetch_moties
        working-directory: moties-tracker
        run: python3 fetch_moties.py

      - name: Run fix_moties_json
        working-directory: moties-tracker
        run: python3 fix_moties_json.py

      - name: Inject moties into HTML
        working-directory: moties-tracker
        run: python3 inject_moties.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add moties-tracker/moties.json moties-tracker/index.html
          git add moties-tracker/agenda.json 2>/dev/null || true

          git diff --staged --quiet \
            && echo "Geen wijzigingen - niets te committen" \
            || (git commit -m "Auto-update: moties $(date +'%Y-%m-%d %H:%M')" && git push)
