name: Update Moties

on:
  schedule:
    - cron: '0 8 * * *'   # 09:00 NL — ochtendscrape
    - cron: '0 17 * * *'  # 18:00 NL — na stemmingen
  workflow_dispatch:       # handmatig starten via GitHub UI

permissions:
  contents: write

jobs:
  fetch-moties:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout repo
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Setup Python
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      # Install dependencies if you have requirements.txt
      - name: Install dependencies
        run: |
          if [ -f motie-tracker/requirements.txt ]; then
            pip install -r motie-tracker/requirements.txt
          fi

      # Run all Python scripts inside motie-tracker
      - name: Run motie scripts
        working-directory: motie-tracker
        run: |
          python fetch_moties.py
          python fix_moties_json.py
          python embed_moties.py

      # Commit and push changes
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add motie-tracker/moties.json motie-tracker/index.html
          git diff --staged --quiet && echo "Geen wijzigingen" || \
            git commit -m "Auto-update: moties $(date +'%Y-%m-%d %H:%M')" && \
            git push
