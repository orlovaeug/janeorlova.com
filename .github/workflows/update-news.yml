name: Update Jetten News

on:
  schedule:
    - cron: '0 7 * * *'   # 08:00 NL
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Dependencies installeren
        run: |
          if [ -f jetten-sentiment/requirements.txt ]; then
            pip install -r jetten-sentiment/requirements.txt
          else
            pip install requests feedparser
          fi

      # 4️⃣ Run the script
      - name: Nieuws ophalen
        working-directory: jetten-sentiment
        run: python fetch_news.py

      # 5️⃣ Commit changes
      - name: data.json committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jetten-sentiment/data.json
          git diff --staged --quiet \
            && echo "Geen nieuwe artikelen." \
            || (git commit -m "Auto-update: nieuws $(date +'%Y-%m-%d %H:%M UTC')" && git push origin HEAD)
