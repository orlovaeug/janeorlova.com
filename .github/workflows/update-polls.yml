name: Update Dutch Poll Data

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  update-polls:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python polls/update_polls.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add polls/polls.json
          git diff --staged --quiet || git commit -m "chore: update polls data $(date -u +'%Y-%m-%d')"
          git push
