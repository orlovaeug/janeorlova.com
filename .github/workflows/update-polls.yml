name: Update Dutch Poll Data

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  update-polls:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fix smart quotes in scraper
        run: |
          python3 -c "
          f = open('polls/update_polls.py', 'rb')
          data = f.read()
          f.close()
          data = data.replace(b'\xe2\x80\x9c', b'\"').replace(b'\xe2\x80\x9d', b'\"')
          data = data.replace(b'\xe2\x80\x98', b\"'\").replace(b'\xe2\x80\x99', b\"'\")
          data = data.replace(b'\xe2\x80\x93', b'-').replace(b'\xe2\x80\x94', b'-')
          open('polls/update_polls.py', 'wb').write(data)
          print('Smart quotes removed')
          "

      - name: Run scraper
        run: python polls/update_polls.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add polls/data/
          git diff --staged --quiet || git commit -m "chore: update polls data $(date -u +'%Y-%m-%d')"
          git push
