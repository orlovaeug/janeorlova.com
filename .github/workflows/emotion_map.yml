name: Emotion Map — Compute & Commit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml
      - name: Run script
        working-directory: politics-report
        run: python3 emotion_map_nl.py
      - name: Commit results
        working-directory: politics-report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add emotion_results.json emotion_results.csv fetch_log.txt
          git diff --cached --quiet || git commit -m "chore: update emotion scores $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
