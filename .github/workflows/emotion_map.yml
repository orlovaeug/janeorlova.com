name: Emotion Map — Compute & Commit

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:        # also runnable manually from GitHub Actions tab

jobs:
  compute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run emotion map script
        working-directory: politics-report   # ← script lives here
        run: python3 emotion_map_nl.py

      - name: Commit results back to repo
        working-directory: politics-report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add emotion_results.json emotion_results.csv fetch_log.txt
          git diff --cached --quiet || git commit -m "chore: update emotion scores $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
