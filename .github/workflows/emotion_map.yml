name: Run Emotion Map
on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday at 6am
  workflow_dispatch:        # or manually triggered

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml
      - run: python3 emotion_map_nl.py
      - uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            emotion_results.csv
            emotion_map.html
            fetch_log.txt
